# nvidia-riva-client gRPC connection
riva:
  use_ssl: true
  auth_token_env: AICORE_BEARER_TOKEN

stt:
  grpc_uri: nim-parakeet.ai.preprod-eu-cc.eu-central-1.aws.ml.hana.ondemand.com:443
  model_name: parakeet-1.1b-en-US-asr-offline
  rest_endpoint: https://nim-parakeet.ai.preprod-eu-cc.eu-central-1.aws.ml.hana.ondemand.com/v1/audio/transcriptions
  language_code: en-US
  auth_header: Authorization
  request_timeout_s: 120

tts:
  grpc_uri: nim-magpie.ai.preprod-eu-cc.eu-central-1.aws.ml.hana.ondemand.com:443
  model_name: Magpie-Multilingual.EN-US.Aria
  voice_name: Magpie-Multilingual.EN-US.Aria
  rest_endpoint: https://nim-magpie.ai.preprod-eu-cc.eu-central-1.aws.ml.hana.ondemand.com/v1/audio/synthesize_online
  language_code: en-US
  auth_header: Authorization
  request_timeout_s: 60
  sample_rate: 22050

evaluation:
  stt_concurrency_levels: [1, 5, 10, 20]
  tts_concurrency_levels: [1, 5, 10, 20, 50]
  bootstrap_n: 1000
  results_dir: results/
  log_level: INFO
  data_dir: eval/data/
